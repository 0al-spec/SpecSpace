name: CI

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: viewer-app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Download viewer build artifact
        uses: actions/download-artifact@v4
        with:
          name: viewer-app-dist
          path: viewer/app/dist

      - name: Lint Python sources
        run: make lint

      - name: Run Python tests
        run: make test

  viewer-app:
    name: Viewer App
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: viewer/app/package-lock.json

      - name: Install viewer dependencies
        run: npm ci --prefix viewer/app

      - name: Typecheck viewer app
        run: npm run typecheck --prefix viewer/app

      - name: Lint viewer app
        run: npm run lint --prefix viewer/app

      - name: Build viewer app
        run: npm run build --prefix viewer/app

      - name: Upload viewer build artifact
        uses: actions/upload-artifact@v4
        with:
          name: viewer-app-dist
          path: viewer/app/dist
          if-no-files-found: error

  graphspace:
    name: GraphSpace
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: graphspace/package-lock.json

      - name: Install GraphSpace dependencies
        run: npm ci --prefix graphspace

      - name: Check GraphSpace API boundary
        run: python scripts/check-graphspace-api-boundary.py

      - name: Test GraphSpace
        run: npm test --prefix graphspace

      - name: Lint GraphSpace FSD
        run: npm run lint:fsd --prefix graphspace

      - name: Build GraphSpace
        run: npm run build --prefix graphspace

  docker-compose-smoke:
    name: Docker Compose Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare SpecSpace smoke fixtures
        run: scripts/prepare-specspace-smoke-fixtures.sh "$RUNNER_TEMP/specspace-smoke-fixtures"

      - name: Run SpecSpace Docker Compose smoke
        env:
          SPECSPACE_COMPOSE_PROJECT_NAME: specspace-ci-smoke
          SPECSPACE_API_PORT: "18021"
          SPECSPACE_UI_PORT: "15193"
          SPECSPACE_SMOKE_MODE: compose
        run: scripts/smoke-specspace-deploy.sh
