name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: viewer-app

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Download viewer build artifact
        uses: actions/download-artifact@v8
        with:
          name: viewer-app-dist
          path: viewer/app/dist

      - name: Lint Python sources
        run: make lint

      - name: Run Python tests
        run: make test

  viewer-app:
    name: Viewer App
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: viewer/app/package-lock.json

      - name: Install viewer dependencies
        run: npm ci --prefix viewer/app

      - name: Typecheck viewer app
        run: npm run typecheck --prefix viewer/app

      - name: Lint viewer app
        run: npm run lint --prefix viewer/app

      - name: Build viewer app
        run: npm run build --prefix viewer/app

      - name: Upload viewer build artifact
        uses: actions/upload-artifact@v7
        with:
          name: viewer-app-dist
          path: viewer/app/dist
          if-no-files-found: error

  graphspace:
    name: GraphSpace
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: graphspace/package-lock.json

      - name: Install GraphSpace dependencies
        run: npm ci --prefix graphspace

      - name: Check GraphSpace API boundary
        run: python scripts/check-graphspace-api-boundary.py

      - name: Test GraphSpace
        run: npm test --prefix graphspace

      - name: Lint GraphSpace FSD
        run: npm run lint:fsd --prefix graphspace

      - name: Build GraphSpace
        run: npm run build --prefix graphspace

  specspace-images:
    name: SpecSpace Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      api-image: ${{ steps.image-refs.outputs.api-image }}
      ui-image: ${{ steps.image-refs.outputs.ui-image }}
      api-digest: ${{ steps.build-api.outputs.digest }}
      ui-digest: ${{ steps.build-ui.outputs.digest }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve image refs
        id: image-refs
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          version="$(python3 - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path("graphspace/package.json").read_text())["version"])
          PY
          )"
          echo "api-image=ghcr.io/${owner}/specspace-api" >> "$GITHUB_OUTPUT"
          echo "ui-image=ghcr.io/${owner}/specspace-ui" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "created-at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"

      - name: Download Hyperprompt Linux binary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.HYPERPROMPT_ARTIFACT_READ_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "HYPERPROMPT_ARTIFACT_READ_TOKEN is required to read Hyperprompt artifacts." >&2
            exit 1
          fi
          mkdir -p deps
          run_id="$(
            gh run list \
              --repo 0al-spec/Hyperprompt \
              --workflow CI \
              --branch main \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty'
          )"
          if [ -z "$run_id" ]; then
            echo "No successful Hyperprompt CI run with hyperprompt-linux-amd64 artifact was found." >&2
            exit 1
          fi
          gh run download "$run_id" \
            --repo 0al-spec/Hyperprompt \
            --name hyperprompt-linux-amd64 \
            --dir "$RUNNER_TEMP/hyperprompt-linux-amd64"
          python3 - "$RUNNER_TEMP/hyperprompt-linux-amd64/hyperprompt-artifact.json" <<'PY'
          import json
          import sys
          from pathlib import Path

          metadata = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          if metadata.get("linkage") != "static-swift-stdlib":
              raise SystemExit(
                  "Hyperprompt artifact must be linked with static Swift stdlib; "
                  f"got {metadata.get('linkage')!r}"
              )
          PY
          install -m 0755 "$RUNNER_TEMP/hyperprompt-linux-amd64/hyperprompt" deps/hyperprompt
          cp "$RUNNER_TEMP/hyperprompt-linux-amd64/hyperprompt-artifact.json" deps/hyperprompt-artifact.json
          deps/hyperprompt --version

      - name: Download Agent Passport Linux binary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mkdir -p deps
          release_tag="$(
            gh release view \
              --repo 0al-spec/agent-passport \
              --json tagName \
              --jq '.tagName'
          )"
          if [ -z "$release_tag" ]; then
            echo "No Agent Passport release tag found." >&2
            exit 1
          fi
          version="${release_tag#v}"
          host="x86_64-unknown-linux-gnu"
          asset="agent-passport-${version}-${host}"
          artifact_dir="$RUNNER_TEMP/agent-passport-linux-amd64"
          mkdir -p "$artifact_dir"

          gh release download "$release_tag" \
            --repo 0al-spec/agent-passport \
            --pattern "${asset}*" \
            --dir "$artifact_dir"

          (
            cd "$artifact_dir"
            sha256sum -c "${asset}.sha256"
          )
          install -m 0755 "$artifact_dir/$asset" deps/agent-passport

          cat > "$RUNNER_TEMP/agent-passport-smoke.passport.yaml" <<'YAML'
          passport:
            apiVersion: "agent-passport.io/v1alpha1"
            kind: "AgentPassport"
            metadata:
              name: "specspace-release-smoke"
              uid: "123e4567-e89b-12d3-a456-426614174000"
              version: "1.0.0"
              issueDate: "2025-01-01T00:00:00Z"
              expiryDate: "9999-12-31T23:59:59Z"
              issuer: "0AL"
            spec:
              entity:
                type: "system-agent"
                description: "Release smoke validation passport."
                owner: "0AL"
                contact: "ops@example.invalid"
              capabilities:
                - name: "validate_passport"
                  description: "Validate Agent Passport YAML documents."
                  signature:
                    parameters: []
                    returns:
                      type: "object"
                      description: "Validation report."
                  accessControl: ["internal"]
              resources:
                cpu: "100m"
                memory: "128Mi"
                fileSystemAccess: []
                executables:
                  - "/app/deps/agent-passport"
              securityPolicies:
                capabilities: []
                networkRestrictions:
                  denyList: ["0.0.0.0/0"]
                executionEnvironment:
                  isolated: true
                  privileged: false
            signature:
              algorithm: "EdDSA"
              value: "YWJjZA=="
              publicKeyRef: "did:example:issuer:0al:key1"
              signedBy: "0AL"
          YAML
          deps/agent-passport --help >/dev/null
          deps/agent-passport validate "$RUNNER_TEMP/agent-passport-smoke.passport.yaml"

          python3 - "$artifact_dir/${asset}.sha256" "$release_tag" "$version" "$host" <<'PY' > deps/agent-passport-artifact.json
          import json
          import sys
          from pathlib import Path

          checksum_line = Path(sys.argv[1]).read_text(encoding="utf-8").splitlines()[0]
          sha256 = checksum_line.split()[0]
          print(json.dumps({
              "artifact_kind": "specspace_bundled_agent_passport_cli",
              "schema_version": 1,
              "source_repository": "0al-spec/agent-passport",
              "release_tag": sys.argv[2],
              "version": sys.argv[3],
              "host": sys.argv[4],
              "binary_path": "/app/deps/agent-passport",
              "sha256": sha256,
          }, indent=2, sort_keys=True))
          PY

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        id: build-api
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.image-refs.outputs.api-image }}:${{ github.sha }}
          build-args: |
            SPECSPACE_RELEASE_COMMIT=${{ github.sha }}
            SPECSPACE_RELEASE_CREATED_AT=${{ steps.image-refs.outputs.created-at }}
            SPECSPACE_VERSION=${{ steps.image-refs.outputs.version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.image-refs.outputs.version }}

      - name: Build UI image
        id: build-ui
        uses: docker/build-push-action@v7
        with:
          context: .
          file: graphspace/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.image-refs.outputs.ui-image }}:${{ github.sha }}
          build-args: |
            SPECSPACE_RELEASE_COMMIT=${{ github.sha }}
            SPECSPACE_RELEASE_CREATED_AT=${{ steps.image-refs.outputs.created-at }}
            SPECSPACE_VERSION=${{ steps.image-refs.outputs.version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.image-refs.outputs.version }}

  timeweb-docker-support:
    name: Timeweb Docker Support
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check out Platform deploy renderer
        uses: actions/checkout@v6
        with:
          repository: 0al-spec/Platform
          ref: 7a2dcb0e1a25feb81b65ecebb0d35b38b18a7ccb
          path: Platform

      - name: Validate generated manifest-only deploy tree
        env:
          SPECSPACE_API_IMAGE_REF: ghcr.io/0al-spec/specspace-api@sha256:1111111111111111111111111111111111111111111111111111111111111111
          SPECSPACE_UI_IMAGE_REF: ghcr.io/0al-spec/specspace-ui@sha256:2222222222222222222222222222222222222222222222222222222222222222
          SPECSPACE_RELEASE_COMMIT: ${{ github.sha }}
          SPECSPACE_RELEASE_CREATED_AT: "1970-01-01T00:00:00Z"
        run: |
          cat > "$RUNNER_TEMP/platform-service-images.json" <<JSON
          {
            "artifact_kind": "platform_service_image_lock",
            "schema_version": 1,
            "services": {
              "specspace_api": {
                "image_ref": "${SPECSPACE_API_IMAGE_REF}"
              },
              "specspace_ui": {
                "image_ref": "${SPECSPACE_UI_IMAGE_REF}"
              }
            }
          }
          JSON
          python3 Platform/scripts/platform.py deploy timeweb-render \
            --output-dir "$RUNNER_TEMP/timeweb-deploy" \
            --image-lock "$RUNNER_TEMP/platform-service-images.json" \
            --release-commit "$SPECSPACE_RELEASE_COMMIT" \
            --release-created-at "$SPECSPACE_RELEASE_CREATED_AT"
          python3 Platform/scripts/platform.py deploy timeweb-validate \
            --path "$RUNNER_TEMP/timeweb-deploy"
          scripts/validate-timeweb-deploy-tree.sh "$RUNNER_TEMP/timeweb-deploy"

  trigger-platform-timeweb-publish:
    name: Trigger Platform Timeweb Publish
    runs-on: ubuntu-latest
    needs:
      - backend
      - docker-compose-smoke
      - graphspace
      - specspace-images
      - timeweb-docker-support
      - viewer-app
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.PLATFORM_TIMEWEB_PUBLISH_ENABLED == 'true'

    steps:
      - name: Trigger Platform Timeweb Publish workflow
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_TIMEWEB_PUBLISH_TOKEN }}
          SPECSPACE_API_IMAGE_REF: ${{ needs.specspace-images.outputs.api-image }}@${{ needs.specspace-images.outputs.api-digest }}
          SPECSPACE_UI_IMAGE_REF: ${{ needs.specspace-images.outputs.ui-image }}@${{ needs.specspace-images.outputs.ui-digest }}
          PLATFORM_TIMEWEB_DEPLOY_BRANCH: ${{ vars.PLATFORM_TIMEWEB_DEPLOY_BRANCH }}
          PLATFORM_TIMEWEB_WORKFLOW_REF: ${{ vars.PLATFORM_TIMEWEB_WORKFLOW_REF }}
          PLATFORM_TIMEWEB_ARTIFACT_BASE_URL: ${{ vars.PLATFORM_TIMEWEB_ARTIFACT_BASE_URL }}
          PLATFORM_TIMEWEB_SPECPM_REGISTRY_URL: ${{ vars.PLATFORM_TIMEWEB_SPECPM_REGISTRY_URL }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN}" ]; then
            echo "PLATFORM_TIMEWEB_PUBLISH_TOKEN is required when PLATFORM_TIMEWEB_PUBLISH_ENABLED=true." >&2
            exit 2
          fi
          PLATFORM_TIMEWEB_DEPLOY_BRANCH="${PLATFORM_TIMEWEB_DEPLOY_BRANCH:-timeweb-deploy}"
          PLATFORM_TIMEWEB_WORKFLOW_REF="${PLATFORM_TIMEWEB_WORKFLOW_REF:-main}"
          PLATFORM_TIMEWEB_ARTIFACT_BASE_URL="${PLATFORM_TIMEWEB_ARTIFACT_BASE_URL:-https://specgraph.tech}"
          PLATFORM_TIMEWEB_SPECPM_REGISTRY_URL="${PLATFORM_TIMEWEB_SPECPM_REGISTRY_URL:-https://specpm.dev}"

          python3 - <<'PY' > "$RUNNER_TEMP/platform-timeweb-inputs.json"
          import json
          import os

          image_lock = {
              "artifact_kind": "platform_service_image_lock",
              "schema_version": 1,
              "services": {
                  "specspace_api": {
                      "image_ref": os.environ["SPECSPACE_API_IMAGE_REF"],
                  },
                  "specspace_ui": {
                      "image_ref": os.environ["SPECSPACE_UI_IMAGE_REF"],
                  },
              },
          }
          inputs = {
              "service_image_lock_json": json.dumps(image_lock, sort_keys=True),
              "deploy_branch": os.environ["PLATFORM_TIMEWEB_DEPLOY_BRANCH"],
              "publish_deploy_branch": "true",
              "release_commit": os.environ["GITHUB_SHA"],
              "artifact_base_url": os.environ["PLATFORM_TIMEWEB_ARTIFACT_BASE_URL"],
              "specpm_registry_url": os.environ["PLATFORM_TIMEWEB_SPECPM_REGISTRY_URL"],
          }
          print(json.dumps(inputs))
          PY

          gh workflow run timeweb-publish.yml \
            --repo 0al-spec/Platform \
            --ref "$PLATFORM_TIMEWEB_WORKFLOW_REF" \
            --json < "$RUNNER_TEMP/platform-timeweb-inputs.json" \
            > "$RUNNER_TEMP/platform-timeweb-run-url.txt"

          run_url="$(cat "$RUNNER_TEMP/platform-timeweb-run-url.txt")"
          echo "Triggered Platform Timeweb Publish: ${run_url}"
          run_id=""
          if [[ "${run_url}" = https://* ]]; then
            run_id="${run_url##*/}"
          fi
          if ! [[ "${run_id}" =~ ^[0-9]+$ ]]; then
            echo "Platform workflow run URL was unavailable; locating newest workflow_dispatch run." >&2
            sleep 5
            run_id="$(gh run list \
              --repo 0al-spec/Platform \
              --workflow timeweb-publish.yml \
              --branch "$PLATFORM_TIMEWEB_WORKFLOW_REF" \
              --event workflow_dispatch \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // ""')"
          fi
          if ! [[ "${run_id}" =~ ^[0-9]+$ ]]; then
            echo "Could not determine Platform workflow run id from: ${run_url:-<empty>}" >&2
            exit 2
          fi
          gh run watch "${run_id}" \
            --repo 0al-spec/Platform \
            --interval 10 \
            --exit-status

  production-deploy-smoke:
    name: Production Deploy Smoke
    runs-on: ubuntu-latest
    needs:
      - trigger-platform-timeweb-publish
    if: >-
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.SPECSPACE_DEPLOY_URL != '' &&
      needs.trigger-platform-timeweb-publish.result == 'success'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Wait for production deploy to pick up published manifest
        env:
          SPECSPACE_DEPLOY_URL: ${{ vars.SPECSPACE_DEPLOY_URL }}
          SPECSPACE_RELEASE_COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          health_url="${SPECSPACE_DEPLOY_URL%/}/api/v1/health"
          echo "Waiting for ${health_url} to report ${SPECSPACE_RELEASE_COMMIT}"
          for attempt in $(seq 1 30); do
            body="$(curl --connect-timeout 5 --max-time 15 -fsS "$health_url" || true)"
            deployed_commit="$(BODY="$body" python - <<'PY'
          import json
          import os

          raw = os.environ.get("BODY", "")
          try:
              payload = json.loads(raw)
          except json.JSONDecodeError:
              raise SystemExit(0)
          commit = payload.get("deployment", {}).get("commit")
          if isinstance(commit, str):
              print(commit)
          PY
            )"
            if [ "$deployed_commit" = "$SPECSPACE_RELEASE_COMMIT" ]; then
              echo "Production deploy reports expected deployed commit ${SPECSPACE_RELEASE_COMMIT}"
              exit 0
            fi
            if [ -n "$deployed_commit" ]; then
              git fetch --quiet --no-tags origin main
              if git cat-file -e "${deployed_commit}^{commit}" 2>/dev/null &&
                git merge-base --is-ancestor "$SPECSPACE_RELEASE_COMMIT" "$deployed_commit"; then
                echo "Production deploy already reports newer deployed commit ${deployed_commit}"
                exit 0
              fi
            fi
            echo "Attempt ${attempt}/30: deployed commit ${deployed_commit:-<none>} is not updated yet"
            sleep 20
          done
          echo "Production deploy did not report commit ${SPECSPACE_RELEASE_COMMIT}" >&2
          echo "Last /api/v1/health body:" >&2
          echo "${body:-<empty>}" >&2
          exit 1

      - name: Verify core production endpoints
        env:
          SPECSPACE_DEPLOY_URL: ${{ vars.SPECSPACE_DEPLOY_URL }}
        run: |
          set -euo pipefail
          base="${SPECSPACE_DEPLOY_URL%/}"
          curl --connect-timeout 5 --max-time 20 -fsS "${base}/api/v1/health" >/dev/null
          curl --connect-timeout 5 --max-time 20 -fsS "${base}/api/v1/spec-graph" >/dev/null
          curl --connect-timeout 5 --max-time 20 -fsS "${base}/api/v1/implementation-work-index" >/dev/null
          if ! curl --connect-timeout 5 --max-time 20 -fsS "${base}/api/v1/specpm/registry" >/dev/null; then
            echo "::warning::SpecPM registry endpoint is unavailable; deploy smoke keeps this diagnostic non-blocking because it depends on an external registry."
          fi

      - name: Verify product workspace production route
        env:
          SPECSPACE_DEPLOY_URL: ${{ vars.SPECSPACE_DEPLOY_URL }}
          SPECSPACE_PRODUCT_WORKSPACE_ID: ${{ vars.SPECSPACE_PRODUCT_WORKSPACE_ID || 'team-decision-log' }}
          SPECSPACE_PRODUCT_WORKSPACE_ARTIFACT_BASE_URL: ${{ vars.SPECSPACE_PRODUCT_WORKSPACE_ARTIFACT_BASE_URL || 'https://specgraph.tech/workspaces/team-decision-log' }}
        run: |
          set -euo pipefail
          set +e
          python scripts/product_workspace_production_smoke.py \
            --base-url "$SPECSPACE_DEPLOY_URL" \
            --workspace "$SPECSPACE_PRODUCT_WORKSPACE_ID" \
            --artifact-base "$SPECSPACE_PRODUCT_WORKSPACE_ARTIFACT_BASE_URL" \
            --expect-managed-mode read_only \
            --format json > "$RUNNER_TEMP/product-workspace-production-smoke.json"
          smoke_status=$?
          set -e
          cat "$RUNNER_TEMP/product-workspace-production-smoke.json"
          exit "$smoke_status"

      - name: Upload product workspace production smoke report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: product-workspace-production-smoke
          path: ${{ runner.temp }}/product-workspace-production-smoke.json
          if-no-files-found: error

  docker-compose-smoke:
    name: Docker Compose Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Prepare SpecSpace smoke fixtures
        run: scripts/prepare-specspace-smoke-fixtures.sh "$RUNNER_TEMP/specspace-smoke-fixtures"

      - name: Run SpecSpace Docker Compose smoke
        env:
          SPECSPACE_COMPOSE_PROJECT_NAME: specspace-ci-smoke
          SPECSPACE_API_PORT: "18021"
          SPECSPACE_UI_PORT: "15193"
          SPECSPACE_SMOKE_MODE: compose
        run: scripts/smoke-specspace-deploy.sh
