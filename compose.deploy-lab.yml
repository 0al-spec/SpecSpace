name: specspace-deploy-lab

services:
  specgraph-static:
    image: nginx:1.27-alpine
    ports:
      - "${SPECGRAPH_STATIC_PORT:-8082}:8080"
    volumes:
      - type: bind
        source: ${SPECGRAPH_PUBLIC_DIR:-../SpecGraph/dist/specgraph-public}
        target: /usr/share/nginx/html
        read_only: true
      - type: bind
        source: ./deploy/local-static/nginx-static.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true

  specpm-registry:
    image: nginx:1.27-alpine
    ports:
      - "${SPECPM_REGISTRY_PORT:-8081}:8080"
    volumes:
      - type: bind
        source: ${SPECPM_PUBLIC_INDEX_DIR:-../SpecPM/.specpm/public-index}
        target: /usr/share/nginx/html
        read_only: true
      - type: bind
        source: ./deploy/local-static/nginx-static.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true

  specspace-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: specspace-api:local
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - http://specgraph-static:8080
      - --specpm-registry-url
      - http://specpm-registry:8080
    ports:
      - "${SPECSPACE_API_PORT:-8011}:8001"
    volumes:
      - type: bind
        source: ${SPECSPACE_DIALOG_DIR:-./runs/dialogs}
        target: /data/dialogs
        read_only: true
    depends_on:
      - specgraph-static
      - specpm-registry
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  specspace-ui:
    build:
      context: .
      dockerfile: graphspace/Dockerfile
    image: specspace-ui:local
    ports:
      - "${SPECSPACE_UI_PORT:-5183}:80"
    depends_on:
      - specspace-api
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
