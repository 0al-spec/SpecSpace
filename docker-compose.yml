name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:a77a8eea7cce442eb50a1c50a5c2ba7955b2de97aeecb3590474846448bfa893"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:c3f750b96721d5e5be35e92cf4440b88ea55d110db39ac1a82c55ee7510f26c2"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:c3f750b96721d5e5be35e92cf4440b88ea55d110db39ac1a82c55ee7510f26c2"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:a77a8eea7cce442eb50a1c50a5c2ba7955b2de97aeecb3590474846448bfa893"
      SPECSPACE_RELEASE_COMMIT: "2ea2d0b3f68279112359b759f8d19d6e95dac7d9"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
