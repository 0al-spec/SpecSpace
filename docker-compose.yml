name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:528cbf9230f991f99a2d8ea178f3d37b9e17bb3d9b3707f13ea1ad336f3df061"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:0acdd13d6744b9412e2a62cdbd74a728fc5f1cc725352f2e2194048ac9c11465"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:0acdd13d6744b9412e2a62cdbd74a728fc5f1cc725352f2e2194048ac9c11465"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:528cbf9230f991f99a2d8ea178f3d37b9e17bb3d9b3707f13ea1ad336f3df061"
      SPECSPACE_RELEASE_COMMIT: "cbc4217af2c9277d5789d2abcfa5655c0ee4991c"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
