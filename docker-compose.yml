name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:a7b1ab63ded5dbc06b7695f8b136dcfa8696b5c55edcfefc16812a6c66dfdd63"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:ef7e5a06c1b8d57d086e24c98d8e51609ae650351010297ea4c90694509281e1"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:ef7e5a06c1b8d57d086e24c98d8e51609ae650351010297ea4c90694509281e1"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:a7b1ab63ded5dbc06b7695f8b136dcfa8696b5c55edcfefc16812a6c66dfdd63"
      SPECSPACE_RELEASE_COMMIT: "fcedfa8c026293246f12cf94121a538cbf50ef94"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
