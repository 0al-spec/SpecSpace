name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:dbe4f6c219b12c8feca9c4c994daa0fdd22f7413fc9d8d1f2e223244036c7e08"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:e80086a7da38179ecfab7448a168c72a50e2b1f7f91cb7d1fc7c4a2cb112f61b"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:e80086a7da38179ecfab7448a168c72a50e2b1f7f91cb7d1fc7c4a2cb112f61b"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:dbe4f6c219b12c8feca9c4c994daa0fdd22f7413fc9d8d1f2e223244036c7e08"
      SPECSPACE_RELEASE_COMMIT: "3ca257c50f983c4b2ebce6bf1fed4cf80d3b3901"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
