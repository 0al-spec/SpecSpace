name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:db3db30831ac47c8639006f882c89b7e2bc0312a48b4bb22f7655f49724291d3"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:95550fe82e1b1a755478fd0add155950dd2c7a292d4fd904855e8f73edf73aad"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:95550fe82e1b1a755478fd0add155950dd2c7a292d4fd904855e8f73edf73aad"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:db3db30831ac47c8639006f882c89b7e2bc0312a48b4bb22f7655f49724291d3"
      SPECSPACE_RELEASE_COMMIT: "ba99ce7b31f0084159234e8b6e4cfd4fc4b1fe8d"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
