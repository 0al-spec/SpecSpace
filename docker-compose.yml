name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:0f75f677352329deaf7cc0ce031590f9e45d288d1189c9a7423d571e3b98c335"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:e87108f16c1bd80b8bc49e418a0a5b7cea30b1ccd8b59046338e0d8021a184b5"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:e87108f16c1bd80b8bc49e418a0a5b7cea30b1ccd8b59046338e0d8021a184b5"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:0f75f677352329deaf7cc0ce031590f9e45d288d1189c9a7423d571e3b98c335"
      SPECSPACE_RELEASE_COMMIT: "e7650de2fafd4866e9beec0921cb472cda3910ce"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
