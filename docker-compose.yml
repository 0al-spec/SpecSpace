name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:9721f39e96eb48a54932ba6e5032019b8798dc09bb5676578f6e27cbaf7629df"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:d57f3fce5bb97c0b6f897be55f1a6e734b2a639991530921a364d7b6e8f85a38"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:d57f3fce5bb97c0b6f897be55f1a6e734b2a639991530921a364d7b6e8f85a38"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:9721f39e96eb48a54932ba6e5032019b8798dc09bb5676578f6e27cbaf7629df"
      SPECSPACE_RELEASE_COMMIT: "291185cc57d9035084c0fd9793451d1269e96eca"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
