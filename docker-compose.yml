name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:7d81e84b00a47e3dd0a214afc9a94ec62cf44d59cf8bcc14f4874b765308627c"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:222a93968ee4d6cc9f01770de2ab09d0b4dfc217f146a784343d1bfa2af6deea"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:222a93968ee4d6cc9f01770de2ab09d0b4dfc217f146a784343d1bfa2af6deea"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:7d81e84b00a47e3dd0a214afc9a94ec62cf44d59cf8bcc14f4874b765308627c"
      SPECSPACE_RELEASE_COMMIT: "878bdca6962782633bb2956fa6b54dcdc33da6d7"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
