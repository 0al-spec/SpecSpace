name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:116121c5240cb660a703690a1eb50f3548695c51e47639898e5dadadd9e5f1ee"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:e94acb38d11570452af723ce360b205e6f432b7a2864249dac3910ebb2221778"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
