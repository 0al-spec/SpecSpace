name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:27056f02720d4ad32a558cf0c9bb60831d6c0a597b3a1f62117378363adacd4c"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:b836f13ea6d3ad5e3b56edfb21b435b7119e772153457e3f735469bbad4adb9d"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:b836f13ea6d3ad5e3b56edfb21b435b7119e772153457e3f735469bbad4adb9d"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:27056f02720d4ad32a558cf0c9bb60831d6c0a597b3a1f62117378363adacd4c"
      SPECSPACE_RELEASE_COMMIT: "f47aa5791fcf40ac3288162a366d26cf0a791373"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
