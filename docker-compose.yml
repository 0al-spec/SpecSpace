name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:322e2065f196bbe676851af922aae0443079d62462f7786b5e6ad496f858df63"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:c74f87ec4840b01d546e0739252f89cddff272cf3ab20b89bc20ae30b2cf2550"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:c74f87ec4840b01d546e0739252f89cddff272cf3ab20b89bc20ae30b2cf2550"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:322e2065f196bbe676851af922aae0443079d62462f7786b5e6ad496f858df63"
      SPECSPACE_RELEASE_COMMIT: "9a08b2d128f834b3de7ccfe14883a74e44e2fa16"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
