name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:a68f434b2be05228e2fc3ea5248d965e0050b8a38097902f2235b7eb945b8d57"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:51bd56b286b62bbadf14bef2d00ec9080ad793b8cb601472e503bdcf6bf7095a"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:51bd56b286b62bbadf14bef2d00ec9080ad793b8cb601472e503bdcf6bf7095a"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:a68f434b2be05228e2fc3ea5248d965e0050b8a38097902f2235b7eb945b8d57"
      SPECSPACE_RELEASE_COMMIT: "3d1570cf0d3b3b54da49ac43c3aa1ddeb47ee787"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
