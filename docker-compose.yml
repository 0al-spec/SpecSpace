name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:488901ecf94279a797001bf690f1ee96e59a66cff346a91ac0456232212d90fa"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:26ce1bd72759a583eeb44d506e5ad645da45c76d453433612bb7e551d3cf3fdf"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:26ce1bd72759a583eeb44d506e5ad645da45c76d453433612bb7e551d3cf3fdf"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:488901ecf94279a797001bf690f1ee96e59a66cff346a91ac0456232212d90fa"
      SPECSPACE_RELEASE_COMMIT: "2b790ddf633bf29eb8297306d804d7317788cfea"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
