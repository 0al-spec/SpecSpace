name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:a6cb9d6ffba8c29b9e480dd7de262f659065972594e2c37738787f659b0dfac9"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:a0ce3d7b8e2ce694c3c3cd16e18f22577e24ad12f25dceab0bec02932c439468"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:a0ce3d7b8e2ce694c3c3cd16e18f22577e24ad12f25dceab0bec02932c439468"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:a6cb9d6ffba8c29b9e480dd7de262f659065972594e2c37738787f659b0dfac9"
      SPECSPACE_RELEASE_COMMIT: "ed1b0e7ddaba52603fdfc28b061028251b906b13"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
