name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:6d5570232e25cf1b11fba084ebd57a12e218364589ae2b26ac4822a3cacaedd4"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:c456df3d582e8fa4f4747325f12df95a505810b8cbe8591b5a07f1526f5b68b5"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:c456df3d582e8fa4f4747325f12df95a505810b8cbe8591b5a07f1526f5b68b5"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:6d5570232e25cf1b11fba084ebd57a12e218364589ae2b26ac4822a3cacaedd4"
      SPECSPACE_RELEASE_COMMIT: "fe40522c4538d3eafc4ba17aa1340f15fa87fd4b"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
