name: specspace

services:
  app:
    build:
      context: .
      dockerfile: graphspace/Dockerfile
    image: specspace-ui:local
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: specspace-api:local
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - https://specgraph.tech
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
