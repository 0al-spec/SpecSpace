name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:43a12bf3386fd8e87ab4c279f5aad1e0eb4139ceb73c743b82692ea931ed5b48"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:aed99fa381d552df7517efd138075e5819010670765c54e4fb03d227e6f7a086"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:aed99fa381d552df7517efd138075e5819010670765c54e4fb03d227e6f7a086"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:43a12bf3386fd8e87ab4c279f5aad1e0eb4139ceb73c743b82692ea931ed5b48"
      SPECSPACE_RELEASE_COMMIT: "c9af5f5b9eb7d13ad40da778a09781161198e9a4"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
