name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:e5f781c9cea8de7195a92ce0fb9020d8d930befef082f3e299d0271fdb918754"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:063de783313cbfd0c29daec8f413388694199955990634788c4eedda7fe1ae7e"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:063de783313cbfd0c29daec8f413388694199955990634788c4eedda7fe1ae7e"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:e5f781c9cea8de7195a92ce0fb9020d8d930befef082f3e299d0271fdb918754"
      SPECSPACE_RELEASE_COMMIT: "10d9c2be931e2cb846bb0f2adf33f4a08504ec9f"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
