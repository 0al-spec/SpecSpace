name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:051dbd3cb8d7f784460be8fd58b0b73ef218c10255f2c5ef055b2435f073e519"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:2af7f1220862a098bee60b7b1edd20d7de7e6b07ff7168c9bcc7bd338d0aaeba"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:2af7f1220862a098bee60b7b1edd20d7de7e6b07ff7168c9bcc7bd338d0aaeba"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:051dbd3cb8d7f784460be8fd58b0b73ef218c10255f2c5ef055b2435f073e519"
      SPECSPACE_RELEASE_COMMIT: "74f02ded371e0b260e1be3636cd21c21a1b1eaba"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
