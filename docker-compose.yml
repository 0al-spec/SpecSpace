name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:d13b4a1b1c68f8c574694dd87c8f748b53cd645108bd0dc7bfc9efd33c446793"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:982635fd5f320f5c50481229b04fc939ce8c12b4c520b170f6f5583d52da3191"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:982635fd5f320f5c50481229b04fc939ce8c12b4c520b170f6f5583d52da3191"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:d13b4a1b1c68f8c574694dd87c8f748b53cd645108bd0dc7bfc9efd33c446793"
      SPECSPACE_RELEASE_COMMIT: "37effde8707b1d39d8787e36309d8322eca50dde"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
