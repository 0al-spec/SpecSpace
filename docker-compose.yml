name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:a2e67c7160cfd00fa5107acd1d263e413c9fb7ade6c39d09c5f0309773061861"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:660aa6909c3590381fe135a1522c7b2ca00413b3c9fe05f440c512afc9db850f"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:660aa6909c3590381fe135a1522c7b2ca00413b3c9fe05f440c512afc9db850f"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:a2e67c7160cfd00fa5107acd1d263e413c9fb7ade6c39d09c5f0309773061861"
      SPECSPACE_RELEASE_COMMIT: "f9ed73abac65ab905087efee9895c0a0b3708e13"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
