name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:2a5343a4e5a4bcc3c8fc00fbdafd6558be347406b63b2bf4541c5433c34962d2"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:142d53f7ec9b1f6aa5d466616363bde28cf5da7106cc6f23094b742234ed2b40"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:142d53f7ec9b1f6aa5d466616363bde28cf5da7106cc6f23094b742234ed2b40"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:2a5343a4e5a4bcc3c8fc00fbdafd6558be347406b63b2bf4541c5433c34962d2"
      SPECSPACE_RELEASE_COMMIT: "f4a3c72208645eeb08a558ceef8d083979bdd735"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
