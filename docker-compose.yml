name: specspace

services:
  specspace-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: specspace-api:local
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --spec-dir
      - /mnt/specgraph/specs/nodes
      - --runs-dir
      - /mnt/specgraph/runs
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
    volumes:
      - type: bind
        source: ${SPECSPACE_DIALOG_DIR:-./runs/dialogs}
        target: /data/dialogs
        read_only: true
      - type: bind
        source: ${SPECSPACE_SPEC_NODES_DIR:?Set SPECSPACE_SPEC_NODES_DIR to the SpecGraph specs/nodes directory}
        target: /mnt/specgraph/specs/nodes
        read_only: true
      - type: bind
        source: ${SPECSPACE_RUNS_DIR:?Set SPECSPACE_RUNS_DIR to the SpecGraph runs directory}
        target: /mnt/specgraph/runs
        read_only: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  specspace-ui:
    build:
      context: .
      dockerfile: graphspace/Dockerfile
    image: specspace-ui:local
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
