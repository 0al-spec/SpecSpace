name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:ad003c95d66940b01ed397c10a501ce7856cf95ef2761b4ba906c5b7a3b0d225"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:08e02ad380e53f36e640b3ab6305f7a1eb6b6fb65d69088fa14108c4499e4da7"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:08e02ad380e53f36e640b3ab6305f7a1eb6b6fb65d69088fa14108c4499e4da7"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:ad003c95d66940b01ed397c10a501ce7856cf95ef2761b4ba906c5b7a3b0d225"
      SPECSPACE_RELEASE_COMMIT: "3d93c7bbc424ddce34927623f1e0acc5d8abc779"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
