name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:bb33cb6d357f10fdd6cea54f20fcfd1317aa26f845c79e91d6272d3810027d36"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:64d5fc697d3dc373bebb3c0fd431070c1e7ae7e83a5f21eb2426441a139c9384"
    environment:
