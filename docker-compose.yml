name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:1155f4a17bd5c1d7b61959a9c7b1fde05cb4a42d82dd4cb0c2d85266731b93d8"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:da070bca7f9827af27c5dd8ac37d10c020d437c63ee1002833727d9890956853"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:da070bca7f9827af27c5dd8ac37d10c020d437c63ee1002833727d9890956853"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:1155f4a17bd5c1d7b61959a9c7b1fde05cb4a42d82dd4cb0c2d85266731b93d8"
      SPECSPACE_RELEASE_COMMIT: "2804fa418bff27560a4655b42fc6e0a9019514ad"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
