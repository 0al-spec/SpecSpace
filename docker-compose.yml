name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:668df07f4f06220dc319e429893806e3acdaef148077f06c9ce694a5654d60d2"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:38c43ea457bde935d61691d4016a7de329ab68530c0f1c47eceaaf8b12c4cafb"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:38c43ea457bde935d61691d4016a7de329ab68530c0f1c47eceaaf8b12c4cafb"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:668df07f4f06220dc319e429893806e3acdaef148077f06c9ce694a5654d60d2"
      SPECSPACE_RELEASE_COMMIT: "b4f95c6b31ee7bde7de228730ee57e9dfafd0e51"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
