name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:a662e88a7583382f8740d64731c67b519881c7d84b55d2708d7389117269ea28"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:b2d980d8d13c3463db272085fce5be45c7be1455a5a306bec31d8f9d55576dfe"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:b2d980d8d13c3463db272085fce5be45c7be1455a5a306bec31d8f9d55576dfe"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:a662e88a7583382f8740d64731c67b519881c7d84b55d2708d7389117269ea28"
      SPECSPACE_RELEASE_COMMIT: "a0ac547c33f2fea2b28f1774e29aa291d9e22279"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
