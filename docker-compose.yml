name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:5eeb8948f64a9eaf42907e66ab5b618e5da2cc308c9690cc646a2e8143216903"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:db655398e32a0b0ad8d414709888ae09752fbf294556d64d77e4ce92d980f702"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:db655398e32a0b0ad8d414709888ae09752fbf294556d64d77e4ce92d980f702"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:5eeb8948f64a9eaf42907e66ab5b618e5da2cc308c9690cc646a2e8143216903"
      SPECSPACE_RELEASE_COMMIT: "88f9c1d6767fdb940ddde5dd5ba08e71a81f1eb2"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
