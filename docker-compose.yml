name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:3cc5bf321c224f9f4898cc132a68444f58d1a1b22d79c78325f9d475c023211c"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:112ba91149d8e8611e5bb109608071a63e0c7ed15a1b38c93fe534eca29117a1"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:112ba91149d8e8611e5bb109608071a63e0c7ed15a1b38c93fe534eca29117a1"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:3cc5bf321c224f9f4898cc132a68444f58d1a1b22d79c78325f9d475c023211c"
      SPECSPACE_RELEASE_COMMIT: "05394cd8a48dfcbaca4ab142573e22e84cb8ba1d"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
