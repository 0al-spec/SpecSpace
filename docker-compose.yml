name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:5aa2a520e52c2c3993826c4cd1fc7069d66d30e00a6f18878afdb44afaee62de"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:e93df33a5fdae4e2f4162b54f46edfc86cb4431b9666acdbcba189a2c7872fcc"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:e93df33a5fdae4e2f4162b54f46edfc86cb4431b9666acdbcba189a2c7872fcc"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:5aa2a520e52c2c3993826c4cd1fc7069d66d30e00a6f18878afdb44afaee62de"
      SPECSPACE_RELEASE_COMMIT: "54aa0a2b4aa966ce96dbd43e3c9c0580a92fe11c"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
