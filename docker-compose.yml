name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:cf46e3cd99217e2886056d96d581d12cc0e74ed1fe4ec1bb7f77a794ef84f10c"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:69eed6bf92f02b7c7f542a4197f19256be322b82704c4eb4982a31e210a3522b"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:69eed6bf92f02b7c7f542a4197f19256be322b82704c4eb4982a31e210a3522b"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:cf46e3cd99217e2886056d96d581d12cc0e74ed1fe4ec1bb7f77a794ef84f10c"
      SPECSPACE_RELEASE_COMMIT: "5883af1277a4fdc01d55191d57759cbbef66a5db"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
