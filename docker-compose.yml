name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:3e8059eef15ecbcc09ef9cfb485e11f8e3e8965f804487268c5ecf5af6ae762b"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:7362387da9e4e9fffb0c768a6c7e5cef1ee09ffc6e5749022123e91bb74c2f6a"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:7362387da9e4e9fffb0c768a6c7e5cef1ee09ffc6e5749022123e91bb74c2f6a"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:3e8059eef15ecbcc09ef9cfb485e11f8e3e8965f804487268c5ecf5af6ae762b"
      SPECSPACE_RELEASE_COMMIT: "a7dd71c55e10ed5926e4a993c3f2b89c76d7e9dc"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
