name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:581475904d6cfbc73acd81a58bca9f054da5727367cd979e12f7546032bfab4a"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:5738c69dae684a27e2dead50451eef98c55cd628973615d9ab47f9ec146991b9"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:5738c69dae684a27e2dead50451eef98c55cd628973615d9ab47f9ec146991b9"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:581475904d6cfbc73acd81a58bca9f054da5727367cd979e12f7546032bfab4a"
      SPECSPACE_RELEASE_COMMIT: "272fc120f5c8e69cb371ca825f02bab38c323db3"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
