name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:7b98cadf768edf83d0a5453843e11901f63a2d9b93be437d73516b9f0260c123"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:fefd8d6b34ab8dbe6ccee7977a168a5a29fdf76e1ffffe5a36344e68310b2fb3"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:fefd8d6b34ab8dbe6ccee7977a168a5a29fdf76e1ffffe5a36344e68310b2fb3"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:7b98cadf768edf83d0a5453843e11901f63a2d9b93be437d73516b9f0260c123"
      SPECSPACE_RELEASE_COMMIT: "d2db1b123ba4af5c7161b868e985e5ba78b0e036"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
