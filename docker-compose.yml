name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:d8f9c58e11ab6d67d492d205b2aa19c9570c59a88de91deb9c3d9e835a30d2aa"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:45af4c082338ef90b4cab265b57996c875811c4fb98fecc6df094be089daca0c"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:45af4c082338ef90b4cab265b57996c875811c4fb98fecc6df094be089daca0c"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:d8f9c58e11ab6d67d492d205b2aa19c9570c59a88de91deb9c3d9e835a30d2aa"
      SPECSPACE_RELEASE_COMMIT: "3bc94da3a385a19f86ee0e1bbca19bd4bd7ca538"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
