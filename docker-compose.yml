name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:0f20d3c58c598617df2052d7118b9ef3b58ceab690b03de6e48434c9acc778e2"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:b9c82d883fb067e6a60eaef4d6cb7da16e624d4c5989e5573fa3a55bdbc27152"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:b9c82d883fb067e6a60eaef4d6cb7da16e624d4c5989e5573fa3a55bdbc27152"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:0f20d3c58c598617df2052d7118b9ef3b58ceab690b03de6e48434c9acc778e2"
      SPECSPACE_RELEASE_COMMIT: "0b68d5bca4de0730f0ca0dcfbf8a2b603b507997"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
