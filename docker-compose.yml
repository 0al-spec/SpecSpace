name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:be71b131c6df57b422d59eff84e7e1741087e55d4ae3c7eac8c64d5c2762989e"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:1a7cab559e4dda6d47d94b750401fe61573963013e5cf085e35dfb31ec7ce539"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:1a7cab559e4dda6d47d94b750401fe61573963013e5cf085e35dfb31ec7ce539"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:be71b131c6df57b422d59eff84e7e1741087e55d4ae3c7eac8c64d5c2762989e"
      SPECSPACE_RELEASE_COMMIT: "d82dddaad3125b1615b7393385b577dc01d3aa9f"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
