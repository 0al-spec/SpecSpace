name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:f45d4583f7069c87b0029b958dc54a803ec65ce7512dc534ed61faec30ed11ad"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:2e42265108d948ae15fbbcca2a47849f8063640da46f1155e0be26ca3b20f419"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:2e42265108d948ae15fbbcca2a47849f8063640da46f1155e0be26ca3b20f419"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:f45d4583f7069c87b0029b958dc54a803ec65ce7512dc534ed61faec30ed11ad"
      SPECSPACE_RELEASE_COMMIT: "00b417109b9abef2d40070dfead2a16ce241697f"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
