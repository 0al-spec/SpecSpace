name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:752e55274ef3d8ad9cc7ae68e810956b0a89a7533d8336c1bf87fac5e9be4311"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:c233a60b4dd9e02edd5a69a4e33d6d82ab1fa2be23fe273d746699fa535a7ab2"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:c233a60b4dd9e02edd5a69a4e33d6d82ab1fa2be23fe273d746699fa535a7ab2"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:752e55274ef3d8ad9cc7ae68e810956b0a89a7533d8336c1bf87fac5e9be4311"
      SPECSPACE_RELEASE_COMMIT: "6afa7e44ee9ffed819d1de3738b7eaa3839d494c"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
