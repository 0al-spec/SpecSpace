name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:1e6307f260fdae473ec60d9767fed2055892652542a038c985ed8ec4438c4232"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:e5f1c665cdf709474a1b422b9d9ee5fc6bdb00f20b30218c8d334ad3feed2c36"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:e5f1c665cdf709474a1b422b9d9ee5fc6bdb00f20b30218c8d334ad3feed2c36"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:1e6307f260fdae473ec60d9767fed2055892652542a038c985ed8ec4438c4232"
      SPECSPACE_RELEASE_COMMIT: "13cd4fe54da5fe906a35c566a7dd0d7c771558a0"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
