name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:c286b265099330f2e40db08eb195eb5b89e917b1d34cf252b9c31953881f02c6"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:5726a112f14dfa956b041b2ef4d41a63d32547b3fcedcd8cf227aea616189199"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:5726a112f14dfa956b041b2ef4d41a63d32547b3fcedcd8cf227aea616189199"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:c286b265099330f2e40db08eb195eb5b89e917b1d34cf252b9c31953881f02c6"
      SPECSPACE_RELEASE_COMMIT: "0c66af9dda539214d8038e1e5830dab5c243809d"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
