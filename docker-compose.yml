name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:f7dd6fa7e7342a826bdf4b05323515e3c7773e46d90ed4c605ceaa6f731bfb24"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:809c5ab3cc2f5ef3ffea9c0f23cf1affa3b31a7ab09d31ddd0fb926c8c2fd96b"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:809c5ab3cc2f5ef3ffea9c0f23cf1affa3b31a7ab09d31ddd0fb926c8c2fd96b"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:f7dd6fa7e7342a826bdf4b05323515e3c7773e46d90ed4c605ceaa6f731bfb24"
      SPECSPACE_RELEASE_COMMIT: "cb966e046b24a547acb2efd5729f372876bf8a46"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
