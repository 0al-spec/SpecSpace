name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:634d6be1b372a97a5185c01780e0979998cce5740a9a676a3b5436e5efd5804b"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:7f476511e6d06359afa230af533f696fc1049c3840dabe70240d2824127e2fef"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:7f476511e6d06359afa230af533f696fc1049c3840dabe70240d2824127e2fef"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:634d6be1b372a97a5185c01780e0979998cce5740a9a676a3b5436e5efd5804b"
      SPECSPACE_RELEASE_COMMIT: "3c6fb0f207999dbddf99b2dc8615ff58f3455eb6"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
