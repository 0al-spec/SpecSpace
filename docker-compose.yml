name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:4a908da60d21d70dba80e5bb9c2c1caae19f5c4077028fb14d0285229d5d2763"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:e3e7b9680c0103519a205dc7a7ce574fa599fa9f55843a4647c069ee831a2b66"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:e3e7b9680c0103519a205dc7a7ce574fa599fa9f55843a4647c069ee831a2b66"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:4a908da60d21d70dba80e5bb9c2c1caae19f5c4077028fb14d0285229d5d2763"
      SPECSPACE_RELEASE_COMMIT: "778b7189059d7a29743d0f379830f13d1fbcc6b1"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
