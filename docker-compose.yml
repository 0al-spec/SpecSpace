name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:7fa1b3fc78ed3679bbbdd563961c09a7542be6532d1237c5c38f6c3a566fc9ca"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:9151a5c7ec0f10035a8fa9127a3820103a9bc0343697508fef0dd05c2e72899f"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:9151a5c7ec0f10035a8fa9127a3820103a9bc0343697508fef0dd05c2e72899f"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:7fa1b3fc78ed3679bbbdd563961c09a7542be6532d1237c5c38f6c3a566fc9ca"
      SPECSPACE_RELEASE_COMMIT: "819b2f453dfd9a788bb70d4ff02fc5e0ac577183"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
