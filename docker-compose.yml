name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:0316854c21852b93da9e97b312d2f60f9f847599e9ae6122a30870dc4d4e2e5e"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:c2659d350bfec533aa5eb19880509b1d280eb8a7d0da09d3f389096f07144b0b"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:c2659d350bfec533aa5eb19880509b1d280eb8a7d0da09d3f389096f07144b0b"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:0316854c21852b93da9e97b312d2f60f9f847599e9ae6122a30870dc4d4e2e5e"
      SPECSPACE_RELEASE_COMMIT: "c8a309231e70d8d9a12c8ea57d37307efe91b1fc"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
