name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:735c8cd6186a88e48a39ee236be1f20231afa0eb78ed790f6639e2c2e1038489"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:2f5b717f332d2f23c005b5d061a6e9431c3d198ae214e210634461c490e68720"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:2f5b717f332d2f23c005b5d061a6e9431c3d198ae214e210634461c490e68720"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:735c8cd6186a88e48a39ee236be1f20231afa0eb78ed790f6639e2c2e1038489"
      SPECSPACE_RELEASE_COMMIT: "5a07077eb3046733cb7de95a1e3a4b85e84ca6a3"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
