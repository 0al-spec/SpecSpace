      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:bb33cb6d357f10fdd6cea54f20fcfd1317aa26f845c79e91d6272d3810027d36"
      SPECSPACE_RELEASE_COMMIT: "6bb98be5970e1ba77ff5c158985e57bbeb7a4248"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
