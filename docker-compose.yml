name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:388651e08409216d84ef1ed43d812323d22039457369d4daefebaa95a113a78c"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:7e6b879275b1af78689cff9b49059c9e581280a5b8a95b2e767e642ce3ec0db7"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:7e6b879275b1af78689cff9b49059c9e581280a5b8a95b2e767e642ce3ec0db7"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:388651e08409216d84ef1ed43d812323d22039457369d4daefebaa95a113a78c"
      SPECSPACE_RELEASE_COMMIT: "72083643de9ea9ba3a6bbb000d36cd8ac4a9f41f"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
