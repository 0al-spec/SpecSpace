name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:952cf773e1a0f628850a4afc81162c1e4c74d1b90667bc351200d2ece8afc17a"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:3eb3e3fd0e7207885f766a17616496d597856b1be58a56f928eada09c9a0b5d9"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:3eb3e3fd0e7207885f766a17616496d597856b1be58a56f928eada09c9a0b5d9"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:952cf773e1a0f628850a4afc81162c1e4c74d1b90667bc351200d2ece8afc17a"
      SPECSPACE_RELEASE_COMMIT: "b9e3cff379f253ff79ea8e97c5fabcceef47a131"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
