name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:1008b17565dd43582b833537632f2811ac3d587ee78339fc761f61ef6ebaf1ab"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:e1a9cfad3fe717a513abbade984dd1b2867361f4a06d8a45bb127533caaf4ab0"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:e1a9cfad3fe717a513abbade984dd1b2867361f4a06d8a45bb127533caaf4ab0"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:1008b17565dd43582b833537632f2811ac3d587ee78339fc761f61ef6ebaf1ab"
      SPECSPACE_RELEASE_COMMIT: "0c49d65d2b6d7ec5d2335deb5cb521e076a40323"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
