name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:1192dd371f13de442e7c24f6378ea6e5c8ec73687426b3d9efe183acef347086"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:d84fe242ac41fe6ad335f340877b8a392d7c591f4a86a1a782976661b7493870"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:d84fe242ac41fe6ad335f340877b8a392d7c591f4a86a1a782976661b7493870"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:1192dd371f13de442e7c24f6378ea6e5c8ec73687426b3d9efe183acef347086"
      SPECSPACE_RELEASE_COMMIT: "9f19396cb5f55f40345a3093e2ade8ab969b5e1a"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
