name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:fbebb84d6ff44a2dfd3c8bf712f8c2e16b32665852bd1481c2b25249b178f8e6"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:661abefa5cd70653882bd575b2da2041531b91aa418d8e21f8bbe27d3e9ea9b9"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:661abefa5cd70653882bd575b2da2041531b91aa418d8e21f8bbe27d3e9ea9b9"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:fbebb84d6ff44a2dfd3c8bf712f8c2e16b32665852bd1481c2b25249b178f8e6"
      SPECSPACE_RELEASE_COMMIT: "efc064d15bb9a4254ecc43d45d8904d600068ace"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
