name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:26972e3968a40f06fbf1e6820a2e11746e68c5f9efe8cb3029858cb914b02dfc"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:739b8883f4e4c5395732f4a046c4da24c85b0c64445d694e489d300a4e05bae9"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:739b8883f4e4c5395732f4a046c4da24c85b0c64445d694e489d300a4e05bae9"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:26972e3968a40f06fbf1e6820a2e11746e68c5f9efe8cb3029858cb914b02dfc"
      SPECSPACE_RELEASE_COMMIT: "e72a4abeef14f6f0022d17e297d72f9786647d76"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
