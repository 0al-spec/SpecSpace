name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:63b24f60dc51e1205b7dcd70f6e5f4c0e1106d3f05fc75cded4860ce85c387e4"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:12556df9b0635f846d8f0a9cc7e38f53006fd6598f9c4c9bc20d07661b746d86"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:12556df9b0635f846d8f0a9cc7e38f53006fd6598f9c4c9bc20d07661b746d86"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:63b24f60dc51e1205b7dcd70f6e5f4c0e1106d3f05fc75cded4860ce85c387e4"
      SPECSPACE_RELEASE_COMMIT: "cbc4379d52169c076700f8b7b1375059b55c04a5"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
