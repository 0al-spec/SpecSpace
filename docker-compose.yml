name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:c648c3bfe25a474e1498abb661e59c597a56199afbe6539386bce59e84b53c36"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:5000853346dcf128c19990723f4ac6efb24aabef1c16e859a43a2e5964cf4e8d"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:5000853346dcf128c19990723f4ac6efb24aabef1c16e859a43a2e5964cf4e8d"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:c648c3bfe25a474e1498abb661e59c597a56199afbe6539386bce59e84b53c36"
      SPECSPACE_RELEASE_COMMIT: "39c49b2e2fe9f89a8abb361aba243288ad8e0979"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
