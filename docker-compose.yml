name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:3e3a1437c68c60e73a07a2728ac3b122d73d668362c6593b7a2c246ee5751d60"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:4f6e519e841d7cfca8d471cd0239c49fd5975e07d0f7594c8fdf704d9f4591b9"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:4f6e519e841d7cfca8d471cd0239c49fd5975e07d0f7594c8fdf704d9f4591b9"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:3e3a1437c68c60e73a07a2728ac3b122d73d668362c6593b7a2c246ee5751d60"
      SPECSPACE_RELEASE_COMMIT: "459aeff71b6b79bb9cc71036de43543e353132d2"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
