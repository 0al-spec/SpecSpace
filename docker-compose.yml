name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:33dedcfd5dba346972009c6c81073901346bf715469b0372d721d63f828719fc"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:795b16c449ab0a8f659a4016020b85c111e9afb16d676c0db363d98b333cad7e"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:795b16c449ab0a8f659a4016020b85c111e9afb16d676c0db363d98b333cad7e"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:33dedcfd5dba346972009c6c81073901346bf715469b0372d721d63f828719fc"
      SPECSPACE_RELEASE_COMMIT: "6878295a3080f84442e3b32f6ef18fb2bfd91e74"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
