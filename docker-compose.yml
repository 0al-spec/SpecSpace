name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:f9bce9af60cff9b10cae67bef58d0de52352062f9c4517b6a73eaac9807a91fc"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:89c1a8d08957e2b5626c6549db1ec0274ce868cd85963b90d00b6ae4fc6f49d7"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:89c1a8d08957e2b5626c6549db1ec0274ce868cd85963b90d00b6ae4fc6f49d7"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:f9bce9af60cff9b10cae67bef58d0de52352062f9c4517b6a73eaac9807a91fc"
      SPECSPACE_RELEASE_COMMIT: "6153c540b18d078d16073dcb02a798adf0e9e3a9"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
