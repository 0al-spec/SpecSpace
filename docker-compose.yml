name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:3a70842805c2f238c60cba67d8363722665818fd8f32fabbd7992af6750e0fda"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:d560ecb52c12ec1360cb37f8f6344373a09004deedbef087878bcd1640647824"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:d560ecb52c12ec1360cb37f8f6344373a09004deedbef087878bcd1640647824"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:3a70842805c2f238c60cba67d8363722665818fd8f32fabbd7992af6750e0fda"
      SPECSPACE_RELEASE_COMMIT: "01e113eb63a0017a9b9746c555c612b09299b1cc"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
