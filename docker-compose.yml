name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:156dc8d711d248458cec6c584bdc9a4ee2ec09a8afd7b341e9a451ad6a3bbc47"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:aa4955a3ed042a710582dce9eb865e5f2844fae8a68441f7122114542a1cb523"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:aa4955a3ed042a710582dce9eb865e5f2844fae8a68441f7122114542a1cb523"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:156dc8d711d248458cec6c584bdc9a4ee2ec09a8afd7b341e9a451ad6a3bbc47"
      SPECSPACE_RELEASE_COMMIT: "51a091885ca1bbc536b6eb690953aa894a4c3f6b"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
