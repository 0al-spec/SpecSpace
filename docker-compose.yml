name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:8bb119316eb45b12ae54f0f5ae35afb6d974a62d057c20e2c6a861b7c2fe0547"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:9d13cfde455a1190d6612ed701eacad368c7b840ec3a8f8ac41358ca23d500a3"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:9d13cfde455a1190d6612ed701eacad368c7b840ec3a8f8ac41358ca23d500a3"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:8bb119316eb45b12ae54f0f5ae35afb6d974a62d057c20e2c6a861b7c2fe0547"
      SPECSPACE_RELEASE_COMMIT: "f61b95e50b5457a31eebe9a868ff7e2f2a622312"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
