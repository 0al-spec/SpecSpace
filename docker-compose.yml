name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:2fbe08cb2eef6849f18adbc7efdb9b52275f95f85f09504071fa3ad8b23c3b3b"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:85f7c0da9164edb19e5ce5c4edbc3b422a1403a98b3ae2609c11bc6406e1e30b"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:85f7c0da9164edb19e5ce5c4edbc3b422a1403a98b3ae2609c11bc6406e1e30b"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:2fbe08cb2eef6849f18adbc7efdb9b52275f95f85f09504071fa3ad8b23c3b3b"
      SPECSPACE_RELEASE_COMMIT: "81e5369576ac14991896c84ce0cbac2236e919e9"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
