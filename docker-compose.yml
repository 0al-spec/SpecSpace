name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:7cfef30ada42ba4de1f622b89dd8e4f95e4cc2a91c963cfcedc3f26111c3ab31"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:32eb4a3df081456c73495af78accd4081b5c1726da8654057b3a22a108eece64"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:32eb4a3df081456c73495af78accd4081b5c1726da8654057b3a22a108eece64"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:7cfef30ada42ba4de1f622b89dd8e4f95e4cc2a91c963cfcedc3f26111c3ab31"
      SPECSPACE_RELEASE_COMMIT: "fffa8f13faa5f917a8bac8ca4fabe038c9644d7d"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
