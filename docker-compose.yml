name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:4d1ace0cb8a4ac504ef8c0689d0cc1cdb58e5b1257c55ece4b2e28a5a12c0964"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:53708c3a82919d6d2efb1e3f8bb088aa43e9fe3fe33faa7a59da26b93b605427"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:53708c3a82919d6d2efb1e3f8bb088aa43e9fe3fe33faa7a59da26b93b605427"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:4d1ace0cb8a4ac504ef8c0689d0cc1cdb58e5b1257c55ece4b2e28a5a12c0964"
      SPECSPACE_RELEASE_COMMIT: "36d09aa756583b46745cb8cef38dc8aa5d5e7a56"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
