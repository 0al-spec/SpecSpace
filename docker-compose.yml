name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:8568e2cb44d0fdedca2e8dbe7e7ae7d791a5afd48aa96e83dcc3b0a0905e1b76"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:a59453725e576cf14eb738277f9467c7e5e6847822d4a77b0378db1fc8ea1a3f"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:a59453725e576cf14eb738277f9467c7e5e6847822d4a77b0378db1fc8ea1a3f"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:8568e2cb44d0fdedca2e8dbe7e7ae7d791a5afd48aa96e83dcc3b0a0905e1b76"
      SPECSPACE_RELEASE_COMMIT: "a01f7f4e21546307df04236b066cae69d5bc3c17"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
