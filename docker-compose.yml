name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:55af559f0f77d8f961bff1caa3e1ad7e5b3ac57db8dfef09a574e23f26a2189a"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:0397e62221868f15b285a322408f9f9d52046ae709d9f103709a8668fa59ccbb"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:0397e62221868f15b285a322408f9f9d52046ae709d9f103709a8668fa59ccbb"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:55af559f0f77d8f961bff1caa3e1ad7e5b3ac57db8dfef09a574e23f26a2189a"
      SPECSPACE_RELEASE_COMMIT: "649c8662f4d5103b1f1a6ed63de87912567c1d49"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
