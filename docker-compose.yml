name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:44b21e85a0ca7cdb87db88fad5a281e304dc37d18500381d2f87dba8c9642cad"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:d3bda6f2d2b195595553bd7c406ff61249f8ea6cc7072025b67db7bf9a2d3880"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:d3bda6f2d2b195595553bd7c406ff61249f8ea6cc7072025b67db7bf9a2d3880"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:44b21e85a0ca7cdb87db88fad5a281e304dc37d18500381d2f87dba8c9642cad"
      SPECSPACE_RELEASE_COMMIT: "f21a0431bd216fed53a85402efc4f1faf412be1a"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
