name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:18f3bf0ce4b37a3da2e2db5c065004878a1093f74e59ced4badbe0e1407baa7b"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:a7e998c94fbb443cc2e90c1515764fa17374ae8e4733e8c0d4999edd871b5004"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:a7e998c94fbb443cc2e90c1515764fa17374ae8e4733e8c0d4999edd871b5004"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:18f3bf0ce4b37a3da2e2db5c065004878a1093f74e59ced4badbe0e1407baa7b"
      SPECSPACE_RELEASE_COMMIT: "ba8bcae78bbce0805d1b79f7b0f5019585134f53"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
