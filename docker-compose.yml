name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:deda9d1957b5680dc9c94661f71e5a4039b4625fb9bfb6fd75a5bc1f94e21115"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:c903be02f273b74e39c1592af050769cf29a2c069fc46099ce032e324be3da34"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:c903be02f273b74e39c1592af050769cf29a2c069fc46099ce032e324be3da34"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:deda9d1957b5680dc9c94661f71e5a4039b4625fb9bfb6fd75a5bc1f94e21115"
      SPECSPACE_RELEASE_COMMIT: "6cfcd0a934ba47cdfb067b6ba2d83cb2d543194f"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
