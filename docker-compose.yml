name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:13b002c850adb1cb21a95b18e93eab60d802add3b6f8d374e2bbdb9971eadc56"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:a96af4fc49ee32480d1544847af27b3fbca56621ea06535f5996d0114fd374bf"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:a96af4fc49ee32480d1544847af27b3fbca56621ea06535f5996d0114fd374bf"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:13b002c850adb1cb21a95b18e93eab60d802add3b6f8d374e2bbdb9971eadc56"
      SPECSPACE_RELEASE_COMMIT: "da6b05773aa32d6b9cb36f99381c66af4294f21e"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
