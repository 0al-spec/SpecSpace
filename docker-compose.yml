name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:9466a95134b16a9487ec9e26c2e67d73af85476eebd89f6d74814af1ec67b9d4"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:c7c5d97b60727614083033ac49dd87f41d88c43b013056e34bde1643842c6082"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:c7c5d97b60727614083033ac49dd87f41d88c43b013056e34bde1643842c6082"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:9466a95134b16a9487ec9e26c2e67d73af85476eebd89f6d74814af1ec67b9d4"
      SPECSPACE_RELEASE_COMMIT: "73150b0b8d6e13301a0d55dbb1a5f4046267bba2"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
