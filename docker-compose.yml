name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:15f2772ab172f11e7dae2b7da97b824dec6696a7226dadb9469f06598d7e98cd"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:358c79b310acd5d668bb22b14eee95cffb965476e0b83ce618e181774decd09d"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:358c79b310acd5d668bb22b14eee95cffb965476e0b83ce618e181774decd09d"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:15f2772ab172f11e7dae2b7da97b824dec6696a7226dadb9469f06598d7e98cd"
      SPECSPACE_RELEASE_COMMIT: "ef0915588fb78bf5c933fde657d9e25aebb850cd"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
