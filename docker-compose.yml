name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:cab3253a6f6e21c78ff47f38091373d4e5fc145871241c580df7560b64fca251"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:e4cd288065878093178c5f9235227d789edefb27dab6d458a42566471d6d3b8a"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:e4cd288065878093178c5f9235227d789edefb27dab6d458a42566471d6d3b8a"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:cab3253a6f6e21c78ff47f38091373d4e5fc145871241c580df7560b64fca251"
      SPECSPACE_RELEASE_COMMIT: "327ca8fb160c8f262e8184ac9606b62e8fc91d9e"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
