name: specspace

services:
  app:
    image: "ghcr.io/0al-spec/specspace-ui@sha256:8a160cb28653fd905b162ac4d42de742b7ebfb3a22e7234c94149d54e19e25ab"
    ports:
      - "${SPECSPACE_UI_PORT:-5173}:80"
    depends_on:
      - specspace-api

  specspace-api:
    image: "ghcr.io/0al-spec/specspace-api@sha256:4a7df483d02f111e1cff77d6cd1654659626f2296c2aa5a77500ff46bfe069fa"
    environment:
      SPECSPACE_API_IMAGE_REF: "ghcr.io/0al-spec/specspace-api@sha256:4a7df483d02f111e1cff77d6cd1654659626f2296c2aa5a77500ff46bfe069fa"
      SPECSPACE_UI_IMAGE_REF: "ghcr.io/0al-spec/specspace-ui@sha256:8a160cb28653fd905b162ac4d42de742b7ebfb3a22e7234c94149d54e19e25ab"
      SPECSPACE_RELEASE_COMMIT: "21cec913449b70ee5e8df33497104c3956212b76"
    command:
      - python
      - viewer/server.py
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dialog-dir
      - /data/dialogs
      - --artifact-base-url
      - "https://specgraph.tech"
      - --specpm-registry-url
      - "https://specpm.dev"
    ports:
      - "${SPECSPACE_API_PORT:-8001}:8001"
